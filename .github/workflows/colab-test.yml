name: Colab Integration Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly to catch API changes
    - cron: '0 0 * * 0'

jobs:
  validate-notebook:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbformat nbconvert jupyter ipykernel
        python -m ipykernel install --user --name python3
    
    - name: Validate and execute notebooks
      run: |
        for notebook in notebooks/*.ipynb; do
          echo "Processing $notebook..."

          # Validate format
          python -c "import nbformat; nbformat.read('$notebook', as_version=4)" || exit 1
          echo "✓ $notebook format is valid"

          # Execute a subset of the notebook for testing (mocking heavy parts)
          # We use --ExecutePreprocessor.timeout=600 to allow for model initialization
          # and we only run the Demo notebook fully since Full_Pipeline takes too long
          if [[ "$notebook" == *"Demo"* ]]; then
            echo "Executing $notebook..."
            # Create a test version that skips the !git clone and !pip install parts
            python -c "
import nbformat
nb = nbformat.read('$notebook', as_version=4)
# Remove cells containing !git clone or !pip install to avoid network/loop issues
nb.cells = [c for c in nb.cells if not ('!git clone' in c.source or '!pip install' in c.source)]
nbformat.write(nb, 'test_exec.ipynb')
"
            jupyter nbconvert --to notebook --execute test_exec.ipynb --output executed.ipynb || exit 1
            echo "✓ $notebook executed successfully"
          fi
        done